<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>File Browser</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
    <div class="container">
        <div class="header">
            <div>
                <div class="title">File Browser</div>
                <div class="subtitle">Browse, search, upload, and download</div>
            </div>
        </div>

        <div class="panel">
            <div class="toolbar">
                <button id="backBtn" class="btn">← Back</button>

                <div>
                    <div id="path" class="path">/</div>
                    <div id="stats" class="stats"></div>
                </div>

                <div class="row">
                    <input id="searchBox" class="input" placeholder="Search in this folder..." />
                    <button id="searchBtn" class="btn primary">Search</button>
                </div>
            </div>

            <div class="row" style="justify-content: space-between; margin-bottom: 10px;">
                <div class="row">
                    <input type="file" id="upload" class="hiddenFile" />
                    <button id="chooseFileBtn" class="btn">Choose file</button>
                    <span id="chosenFile" class="subtitle"></span>
                </div>
                <div class="row">
                    <button id="uploadBtn" class="btn primary">Upload</button>
                    <button id="newBtn" class="btn primary">New</button>
                </div>
            </div>

            <ul id="fileList" class="list"></ul>
        </div>
    </div>

    <script src="js/utils.js" defer></script>
    <script src="js/browse.js" defer></script>
    <script src="js/search.js" defer></script>
    <script src="js/upload.js" defer></script>
    <script src="js/create.js" defer></script>
    <script src="js/app.js" defer></script>
</body>
</html>

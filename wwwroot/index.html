<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>File Browser</title>
    <style>
        :root {
            --bg: #0b1220;
            --panel: #111a2e;
            --panel2: #0f172a;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --border: rgba(255,255,255,.10);
            --accent: #60a5fa;
            --danger: #f87171;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            background: linear-gradient( 160deg, #0b1220 0%, #121b2f 35%, #18253f 70%, #1f2d4d 100% );
            min-height: 100vh;
        }

        .container {
            max-width: 980px;
            margin: 80px auto;
            padding: 0 16px;
        }

        .header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .title {
            font-size: 22px;
            font-weight: 650;
        }

        .subtitle {
            color: var(--muted);
            font-size: 13px;
        }

        .panel {
            background: linear-gradient(180deg, rgba(255,255,255,.04), transparent 60%), var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,.25);
        }

        .toolbar {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
        }

        .path {
            color: var(--muted);
            font-size: 13px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .stats {
            color: var(--muted);
            font-size: 12px;
            margin-top: 4px;
        }

        .row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            background: rgba(255,255,255,.06);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform .03s ease, background .12s ease, border-color .12s ease;
            user-select: none;
            font-size: 13px;
        }

            .btn:hover {
                background: rgba(255,255,255,.10);
                border-color: rgba(255,255,255,.18);
            }

            .btn:active {
                transform: translateY(1px);
            }

            .btn.primary {
                border-color: rgba(96,165,250,.45);
            }

            .btn.link {
                background: transparent;
                border: 0;
                color: var(--accent);
                padding: 0;
            }

                .btn.link:hover {
                    text-decoration: underline;
                }

        .input {
            width: 100%;
            background: rgba(255,255,255,.04);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 9px 10px;
            border-radius: 10px;
            outline: none;
            font-size: 13px;
        }

            .input:focus {
                border-color: rgba(96,165,250,.55);
            }

        .list {
            list-style: none;
            padding: 0;
            margin: 0;
            border-top: 1px solid var(--border);
        }

        .item {
            display: grid;
            grid-template-columns: 22px 1fr auto;
            gap: 10px;
            align-items: center;
            padding: 10px 6px;
            border-bottom: 1px solid var(--border);
        }

            .item:hover {
                background: rgba(255,255,255,.03);
            }

        .name {
            display: flex;
            gap: 10px;
            align-items: center;
            min-width: 0;
        }

            .name a {
                color: var(--text);
                text-decoration: none;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

                .name a:hover {
                    color: var(--accent);
                }

        .meta {
            color: var(--muted);
            font-size: 12px;
            margin-left: auto;
            white-space: nowrap;
        }

        .right {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: flex-end;
        }

        .hiddenFile {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div>
                <div class="title">File Browser</div>
                <div class="subtitle">Browse, search, upload, and download</div>
            </div>
        </div>

        <div class="panel">
            <div class="toolbar">
                <button id="backBtn" class="btn">← Back</button>

                <div>
                    <div id="path" class="path">/</div>
                    <div id="stats" class="stats"></div>
                </div>

                <div class="row">
                    <input id="searchBox" class="input" placeholder="Search in this folder..." />
                    <button id="searchBtn" class="btn primary">Search</button>
                </div>
            </div>

            <div class="row" style="justify-content: space-between; margin-bottom: 10px;">
                <div class="row">
                    <input type="file" id="upload" class="hiddenFile" />
                    <button id="chooseFileBtn" class="btn">Choose file</button>
                    <span id="chosenFile" class="subtitle"></span>
                </div>
                <button id="uploadBtn" class="btn primary">Upload</button>
            </div>

            <ul id="fileList" class="list"></ul>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
